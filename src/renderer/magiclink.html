<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: rgba(18, 18, 20, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      -webkit-user-select: none;
      user-select: none;
    }
    input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: #f2f2f7;
      font-size: 13px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }
    input:focus {
      border-color: rgba(0,122,255,0.55);
      background: rgba(255,255,255,0.10);
    }
    input::placeholder { color: rgba(255,255,255,0.28); }
    button {
      padding: 7px 16px;
      background: #007AFF;
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    button:hover { background: #0066DD; }
    button:active { background: #0055BB; }
    button:disabled { background: #4A9EFF; cursor: not-allowed; opacity: 0.7; }
  </style>
</head>
<body>
  <input id="inp" placeholder="粘贴 Magic Link 或回调 URL…" autofocus />
  <button id="btn">跳转</button>
  <script>
    const inp = document.getElementById('inp');
    const btn = document.getElementById('btn');

    function applyLocale() {
      inp.placeholder = window.magiclinkApi.t('magiclink.placeholder');
      btn.textContent = window.magiclinkApi.t('magiclink.go');
    }

    applyLocale();
    window.magiclinkApi.onLocaleChange(() => applyLocale());

    function go() {
      const url = inp.value.trim();
      if (!url || btn.disabled) return;
      btn.disabled = true;
      inp.disabled = true;
      btn.textContent = '…';
      window.magiclinkApi.navigate(url);
      // Re-enable after 6s as fallback if navigation stalls
      setTimeout(() => {
        btn.disabled = false;
        inp.disabled = false;
        btn.textContent = window.magiclinkApi.t('magiclink.go');
      }, 6000);
    }
    btn.addEventListener('click', go);
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
  </script>
</body>
</html>
